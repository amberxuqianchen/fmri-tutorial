name: Test Scripts

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov numpy pandas nibabel nilearn pybids

      - name: Run tests
        run: |
          pytest tests/ -v \
            --ignore=tests/test_nipype_workflow.py \
            --ignore=tests/test_glm_preparation.py \
            --cov=. \
            --cov-report=term-missing
