name: Lint Notebooks and Scripts

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nbval flake8 black jupyter nbformat

      - name: Check Python formatting with black
        run: |
          find . -path ./node_modules -prune -o -path ./.git -prune -o \
            -name "*.py" -path "*/scripts/*" -print \
            | xargs --no-run-if-empty black --check

      - name: Lint Python files with flake8
        run: |
          find . -path ./node_modules -prune -o -path ./.git -prune -o \
            -name "*.py" -print \
            | xargs --no-run-if-empty flake8 --max-line-length=100

      - name: Validate notebooks are valid JSON
        run: |
          python - <<'EOF'
          import sys
          import json
          import pathlib
          import nbformat

          errors = []
          notebooks = list(pathlib.Path(".").rglob("*.ipynb"))
          if not notebooks:
              print("No notebooks found.")
              sys.exit(0)

          for nb_path in notebooks:
              try:
                  with open(nb_path, "r", encoding="utf-8") as f:
                      nbformat.read(f, as_version=4)
                  print(f"  OK: {nb_path}")
              except Exception as e:
                  errors.append(f"  FAIL: {nb_path}: {e}")

          if errors:
              print("\nNotebook validation errors:")
              for err in errors:
                  print(err)
              sys.exit(1)
          else:
              print(f"\nAll {len(notebooks)} notebook(s) are valid.")
          EOF
